<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
        }
        nav { 
            background: #f4f4f4; 
            padding: 1rem; 
            margin-bottom: 2rem; 
        }
        nav a { 
            margin-right: 1.5rem; 
            text-decoration: none; 
            color: #333; 
            font-weight: 500;
        }
        nav a:hover { 
            color: #007bff; 
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }
        .project { 
            border: 1px solid #ddd; 
            padding: 1rem; 
            margin: 1rem 0; 
            border-radius: 5px; 
        }
        .contact-form { 
            max-width: 500px; 
        }
        .form-group { 
            margin-bottom: 1rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: 500;
        }
        input, textarea { 
            width: 100%; 
            padding: 0.5rem; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box;
        }
        button { 
            background: #007bff; 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 1rem;
        }
        button:hover { 
            background: #0056b3; 
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/projects">Projects</a>
            <a href="/contact">Contact</a>
            <a href="/health">Health Check</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="margin-top: 3rem; padding: 2rem; background: #f4f4f4; text-align: center;">
        <div class="container">
            <p>&copy; 2025 My Portfolio. Built with Flask.</p>
        </div>
    </footer>
</body>
</html>
