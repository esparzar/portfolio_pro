<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Emmanuel Amponsah | Backend Developer{% endblock %}</title>

    <!-- SEO -->
    <meta name="author" content="Emmanuel Amponsah">
    <meta property="og:title" content="Emmanuel Amponsah | Backend Developer">
    <meta property="og:description" content="Backend Developer building scalable Flask applications and APIs">
    <meta property="og:type" content="website">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-neutral-950 text-neutral-200 antialiased selection:bg-white selection:text-black">

    <!-- NAVBAR COMPONENT -->
    {% include "components/navbar.html" %}


    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 md:px-6 py-12">
        {% block content %}{% endblock %}
    </main>


    <!-- FOOTER COMPONENT -->
    {% include "components/footer.html" %}


    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="fixed bottom-6 right-6 space-y-3 z-50">
                {% for category, message in messages %}
                    <div class="px-4 py-3 rounded-lg text-sm shadow-lg
                        {% if category == 'success' %}
                            bg-green-900 text-green-300
                        {% elif category == 'error' %}
                            bg-red-900 text-red-300
                        {% else %}
                            bg-neutral-800 text-neutral-200
                        {% endif %}
                    ">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}


    <!-- MOBILE MENU SCRIPT -->
    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');

        if (btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
            });
        }
    </script>

</body>
</html>
